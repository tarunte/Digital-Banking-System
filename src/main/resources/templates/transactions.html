<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Transaction History</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f5f7fa;
}

.card{
box-shadow:0px 4px 12px rgba(0,0,0,0.08);
border-radius:10px;
}

.header-box{
background:white;
padding:15px 20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0px 2px 6px rgba(0,0,0,0.05);
}

.badge{
font-size:14px;
padding:6px 10px;
}

.account-number{
font-weight:600;
letter-spacing:1px;
}

</style>

</head>

<body class="container mt-5">

<!-- HEADER -->

<div class="header-box d-flex justify-content-between align-items-center">

<h3 class="mb-0">Transaction History</h3>

<div>

<a href="/statement/pdf" class="btn btn-success me-2">
Download PDF
</a>

<a href="/" class="btn btn-primary">
Back to Dashboard
</a>

</div>

</div>

<!-- TRANSACTION TABLE -->

<div class="card">

<div class="card-body">

<table class="table table-striped table-bordered align-middle">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Type</th>
<th>From Account</th>
<th>To Account</th>
<th>Amount</th>
<th>Date</th>
</tr>

</thead>

<tbody>

<tr th:each="t : ${transactions}">

<td th:text="${t.id}"></td>

<td>

<!-- Deposit -->
<span class="badge bg-success"
th:if="${t.fromAccount == null}">
Deposit
</span>

<!-- Withdraw -->
<span class="badge bg-warning text-dark"
th:if="${t.toAccount == null}">
Withdraw
</span>

<!-- Transfer -->
<span class="badge bg-primary"
th:if="${t.fromAccount != null and t.toAccount != null}">
Transfer
</span>

</td>

<!-- FROM ACCOUNT -->

<td>

<span th:if="${t.fromAccount != null}"
class="account-number"
th:text="${@accountRepository.findById(t.fromAccount).get().accountNumber}">
</span>

<span th:if="${t.fromAccount == null}">
-
</span>

</td>

<!-- TO ACCOUNT -->

<td>

<span th:if="${t.toAccount != null}"
class="account-number"
th:text="${@accountRepository.findById(t.toAccount).get().accountNumber}">
</span>

<span th:if="${t.toAccount == null}">
-
</span>

</td>

<td>
₹ <span th:text="${t.amount}"></span>
</td>

<td th:text="${#temporals.format(t.timestamp,'dd MMM yyyy HH:mm')}"></td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
