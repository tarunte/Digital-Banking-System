<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Bank Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
background:#f4f6f9;
font-family:system-ui;
}

/* Header gradient */

.header-bar{
background:linear-gradient(90deg,#4facfe,#00f2fe);
color:white;
padding:15px 25px;
border-radius:10px;
margin-bottom:25px;
}

/* Cards */

.card-box{
border:none;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
transition:all 0.25s ease;
}

.card-box:hover{
transform:translateY(-4px);
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.balance-card{
font-size:28px;
font-weight:bold;
}

.section-box{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
margin-bottom:28px;
}

.quick-btn{
width:100%;
}

.account-number{
font-weight:bold;
letter-spacing:1px;
}

.icon-btn{
cursor:pointer;
margin-left:8px;
font-size:18px;
}

</style>

</head>

<body class="container mt-4">

<!-- HEADER -->

<div class="header-bar d-flex justify-content-between align-items-center">

<h4 class="mb-0">
<i class="bi bi-bank"></i>
Welcome,
<span th:text="${username}"></span>
</h4>

<form th:action="@{/logout}" method="post">

<input type="hidden"
th:name="${_csrf.parameterName}"
th:value="${_csrf.token}"/>

<button class="btn btn-light btn-sm">
<i class="bi bi-box-arrow-right"></i> Logout
</button>

</form>

</div>

<!-- SUMMARY CARDS -->

<div class="row mb-4">

<div class="col-md-3">
<div class="card card-box text-center">
<div class="card-body">
<i class="bi bi-wallet2 fs-2 text-primary"></i>
<h6 class="mt-2">Accounts</h6>
<h4 th:text="${accounts.size()}"></h4>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-box text-center">
<div class="card-body">
<i class="bi bi-cash-stack fs-2 text-success"></i>
<h6 class="mt-2">Total Balance</h6>
<h4 class="balance-card text-success">
₹ <span th:text="${totalBalance}"></span>
</h4>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-box text-center">
<div class="card-body">
<i class="bi bi-clock-history fs-2 text-warning"></i>
<h6 class="mt-2">Transactions</h6>
<a href="/transactions"
class="btn btn-outline-dark btn-sm mt-2">
View History
</a>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-box text-center">
<div class="card-body">
<i class="bi bi-file-earmark-arrow-down fs-2 text-success"></i>
<h6 class="mt-2">Statements</h6>
<a href="/statement"
class="btn btn-success btn-sm mt-2">
Download PDF
</a>
</div>
</div>
</div>

</div>

<!-- ACCOUNT CARDS -->

<div class="section-box">

<h5 class="mb-3">
<i class="bi bi-credit-card-2-front"></i>
Account Details
</h5>

<div class="row">

<div class="col-md-4 mb-3" th:each="a : ${accounts}">

<div class="card card-box p-3">

<div class="d-flex justify-content-between">

<div>
<h6 class="text-muted" th:text="${a.accountType}"></h6>
<h5 th:text="${a.ownerName}"></h5>
</div>

<i class="bi bi-bank fs-2 text-primary"></i>

</div>

<hr>

<p class="mb-1"><strong>Account Number</strong></p>

<div class="d-flex align-items-center">

<span class="account-number"
th:attr="data-full=${a.accountNumber}"
th:text="${a.accountNumber == null ? 'Not Generated' : 'XXXXXX' + #strings.substring(a.accountNumber,a.accountNumber.length()-4)}">
</span>

<i class="bi bi-eye icon-btn text-primary"
onclick="toggleAccount(this)"></i>

<i class="bi bi-clipboard icon-btn text-success"
onclick="copyAccount(this)"></i>

</div>

<p class="mb-1 mt-3"><strong>IFSC Code</strong></p>

<div class="d-flex align-items-center">

<span th:text="${a.ifscCode}"></span>

<i class="bi bi-clipboard icon-btn text-success"
onclick="copyIFSC(this)"></i>

</div>

<p class="mt-3 mb-1"><strong>Balance</strong></p>

<h4 class="text-success">
₹ <span th:text="${a.balance}"></span>
</h4>

<p class="text-muted small mt-2">
WinBank Digital Branch
</p>

</div>

</div>

</div>

</div>

<!-- SELF TRANSFER -->

<div class="section-box">

<h5>
<i class="bi bi-arrow-left-right"></i>
Self Transfer
</h5>

<form th:action="@{/transfer}" method="post">

<input type="hidden"
th:name="${_csrf.parameterName}"
th:value="${_csrf.token}"/>

<div class="row">

<div class="col-md-4">

<select class="form-select" name="fromAccount" required>

<option value="">Select Sender Account</option>

<option th:each="a : ${accounts}"
th:value="${a.id}"
th:text="${a.accountType + ' - ' + a.accountNumber + ' (₹' + a.balance + ')'}">
</option>

</select>

</div>

<div class="col-md-4">

<select class="form-select" name="toAccount" required>

<option value="">Select Receiver Account</option>

<option th:each="a : ${accounts}"
th:value="${a.id}"
th:text="${a.accountType + ' - ' + a.accountNumber}">
</option>

</select>

</div>

<div class="col-md-3">

<input type="number"
class="form-control"
name="amount"
placeholder="Amount"
required>

</div>

<div class="col-md-1">

<button class="btn btn-primary quick-btn">
Send
</button>

</div>

</div>

</form>

</div>

<!-- ATM SERVICES -->

<div class="section-box">

<h5>
<i class="bi bi-cash-coin"></i>
ATM Services
</h5>

<div class="row">

<div class="col-md-6">

<h6>Deposit</h6>

<form th:action="@{/deposit}" method="post">

<input type="hidden"
th:name="${_csrf.parameterName}"
th:value="${_csrf.token}"/>

<input class="form-control mb-2"
name="accountNumber"
placeholder="Account Number"
required>

<input class="form-control mb-2"
type="number"
name="amount"
placeholder="Amount"
required>

<button class="btn btn-success quick-btn">
Deposit
</button>

</form>

</div>

<div class="col-md-6">

<h6>Withdraw</h6>

<form th:action="@{/withdraw}" method="post">

<input type="hidden"
th:name="${_csrf.parameterName}"
th:value="${_csrf.token}"/>

<input class="form-control mb-2"
name="accountNumber"
placeholder="Account Number"
required>

<input class="form-control mb-2"
type="number"
name="amount"
placeholder="Amount"
required>

<button class="btn btn-warning quick-btn">
Withdraw
</button>

</form>

</div>

</div>

</div>

<script>

function toggleAccount(icon){

let span = icon.parentElement.querySelector(".account-number")
let full = span.getAttribute("data-full")

if(span.innerText.startsWith("XXXXXX")){
span.innerText = full
icon.classList.replace("bi-eye","bi-eye-slash")
}else{
span.innerText = "XXXXXX" + full.slice(-4)
icon.classList.replace("bi-eye-slash","bi-eye")
}

}

function copyAccount(icon){

let span = icon.parentElement.querySelector(".account-number")
let full = span.getAttribute("data-full")

navigator.clipboard.writeText(full)
alert("Account number copied")

}

function copyIFSC(icon){

let text = icon.parentElement.querySelector("span").innerText

navigator.clipboard.writeText(text)
alert("IFSC copied")

}

</script>

</body>
</html>
